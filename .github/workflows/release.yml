name: release
# Build and publish the din container image to Docker Hub. Runs on every push
# to the default branch and on version tags (v*). CI (build/test/lint) stays in
# ci.yml; this workflow only handles image publishing.
on:
  push:
    branches: [master]
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # First 7 chars of the commit SHA — the tag our deploy repo pulls.
      - name: Compute short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            dimozone/din:${{ steps.vars.outputs.sha }}
            dimozone/din:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          {
            echo "### Pushed images"
            echo ""
            echo "- \`dimozone/din:${{ steps.vars.outputs.sha }}\`"
            echo "- \`dimozone/din:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
