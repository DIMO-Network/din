{{- /*
Each ingest replica consumes whole NATS WAL partitions (in.raw.<type>.<did>.pNNN).
With more replicas than partitions some replicas idle and two can race one
partition's writes. Refuse to render a fleet whose replica ceiling exceeds
NATS_STREAM_PARTITIONS (CHD-9); raising partitions is a re-partitioning
operation — follow the runbook.
*/ -}}
{{- $partitions := int (.Values.env.NATS_STREAM_PARTITIONS | default 1) }}
{{- $replicas := int .Values.replicaCount }}
{{- if .Values.autoscaling.enabled }}{{ $replicas = int .Values.autoscaling.maxReplicas }}{{ end }}
{{- if gt $replicas $partitions }}
{{-   fail (printf "din: replica ceiling (%d) exceeds NATS_STREAM_PARTITIONS (%d). Set NATS_STREAM_PARTITIONS >= replicas (re-partitioning runbook) so each replica owns whole partitions." $replicas $partitions) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "din.fullname" . }}
  labels:
    {{- include "din.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "din.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingest
  template:
    metadata:
      annotations:
        checksum/env: {{ include (print $.Template.BasePath "/configenv.yaml" ) . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "din.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingest
    spec:
      # Exceed the sink DrainTimeout (30s) + HTTP shutdown so a rollout/drain
      # lets in-flight bundles flush and ack instead of SIGKILLing mid-commit.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "din.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
          {{  range .Values.image.command -}}
            - {{ . }}
          {{ end }}
          envFrom:
          - configMapRef:
              name: {{ include "din.fullname" . }}-config
          - secretRef:
              name: {{ include "din.fullname" . }}-secret
          env:
          - name: CONTAINER_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: CONTAINER_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          ports:
{{ toYaml .Values.ports | indent 12 }}
          livenessProbe:
{{ toYaml .Values.livenessProbe | indent 12 }}
          readinessProbe:
{{ toYaml .Values.readinessProbe | indent 12 }}
          resources:
{{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: external-http-server-tls
              mountPath: /etc/ssl/certs/din
              readOnly: true
          {{- if .Values.env.LAKE_TEMP_DIRECTORY }}
            - name: duckdb-temp
              mountPath: {{ .Values.env.LAKE_TEMP_DIRECTORY | quote }}
          {{- end }}
      volumes:
        - name: external-http-server-tls
          projected:
            sources:
              - secret:
                  name: {{ include "din.fullname" . }}-tls
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              - configMap:
                  name: {{ .Values.certificate.caConfigMap }}
                  items:
                    - key: root_ca.crt
                      path: root_ca.crt
        {{- if .Values.env.LAKE_TEMP_DIRECTORY }}
        # DuckDB spill target. emptyDir on node ephemeral storage so a large
        # sort/append spills to disk instead of filling the container root fs.
        - name: duckdb-temp
          emptyDir:
            sizeLimit: {{ .Values.duckdbTempSizeLimit | default "5Gi" }}
        {{- end }}
