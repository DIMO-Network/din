apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "din.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
spec:
  data:
  - remoteRef:
      key: {{ .Release.Namespace }}/dis/rpc_url
    secretKey: RPC_URL
  - remoteRef:
      key: {{ .Release.Namespace }}/dis/s3/access_key_id
    secretKey: S3_AWS_ACCESS_KEY_ID
  - remoteRef:
      key: {{ .Release.Namespace }}/dis/s3/secret_access_key
    secretKey: S3_AWS_SECRET_ACCESS_KEY
  - remoteRef:
      key: {{ .Release.Namespace }}/din/lake_catalog_dsn
    secretKey: DUCKLAKE_CATALOG_DSN
  # Client-side blob at-rest encryption key (base64 32B). NewCipher("") is a
  # deliberate no-op, so omitting this silently ships PLAINTEXT blobs (H17) —
  # wire it here so at-rest coverage actually turns on. dq reads the SAME
  # remote key (din writes, dq decrypts): a drift between the two breaks every
  # blob read, so both charts reference one secretsmanager path.
  - remoteRef:
      key: {{ .Release.Namespace }}/din/blob_encryption_key
    secretKey: BLOB_ENCRYPTION_KEY

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-secret-store
  target:
    name: {{ include "din.fullname" . }}-secret
    template:
      metadata: {}
