apiVersion: v1
kind: Service
metadata:
  name: {{ include "din.fullname" . }}
  labels:
    {{- include "din.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  {{- range $key, $value := .Values.service.ports }}
    - name: {{ $key }}
{{ toYaml $value | indent 6 }}
  {{- end }}
  selector:
    {{- include "din.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingest

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "din.fullname" . }}-attest
  labels:
    {{- include "din.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
  selector:
    {{- include "din.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingest
  type: {{ .Values.service.type }}
