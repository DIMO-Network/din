replicaCount: 1
image:
  repository: dimozone/din
  pullPolicy: IfNotPresent
  tag: ''
  command:
    - /din
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  create: true
  annotations: {}
  name: ''
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - all
isDev: true
env:
  ENVIRONMENT: dev
  LOG_LEVEL: info
  OPS_ADDRESS: 0.0.0.0:8888
  DIS_CONNECTION_ADDRESS: 0.0.0.0:9443
  DIS_ATTESTATION_ADDRESS: 0.0.0.0:9442
  TLS_CERT_FILE: /etc/ssl/certs/din/tls.crt
  TLS_KEY_FILE: /etc/ssl/certs/din/tls.key
  TLS_CA_CERT_FILE: /etc/ssl/certs/din/root_ca.crt
  NATS_MODE: external
  NATS_URL: nats://nats-dev:4222
  NATS_REPLICAS: '1'
  # Per-partition WAL size backstop (bytes); 0 = unlimited (MaxAge 48h still applies).
  # Set to bound disk use if the sink stalls for a long time. Size to the NATS volume / N partitions.
  NATS_STREAM_MAX_BYTES: '0'
  DECODESTREAM_ENABLED: 'true'
  FINGERPRINT_VALIDATION: 'true'
  ALLOWABLE_TIME_SKEW: 5m
  DIMO_REGISTRY_CHAIN_ID: 80002
  VEHICLE_NFT_ADDRESS: '0x45fbCD3ef7361d156e8b16F5538AE36DEdf61Da8'
  AFTERMARKET_NFT_ADDRESS: '0x325b45949C833986bC98e98a49F3CA5C5c4643B5'
  SYNTHETIC_NFT_ADDRESS: '0x78513c8CB4D6B6079f813850376bc9c7fc8aE67f'
  TOKEN_EXCHANGE_JWK_KEY_SET_URL: https://auth.dev.dimo.zone/keys
  TOKEN_EXCHANGE_ISSUER_URL: https://auth.dev.dimo.zone
  DOCUMENT_SIZE_THRESHOLD: '1048576'
  BLOB_BUCKET: dimo-blob-storage-dev
  BLOB_PREFIX: cloudevent/blobs/
  S3_AWS_REGION: us-east-2
  # DuckLake: DUCKLAKE_CATALOG_DSN comes from the secret. DATA_PATH is
  # immutable once the catalog exists — choose deliberately.
  DUCKLAKE_DATA_PATH: s3://dimo-storage-dev/lake/
  # DuckDB spill volume. When set, an emptyDir (duckdbTempSizeLimit) is mounted
  # here on both the ingest and maintenance pods so a large merge/append spills
  # to disk instead of the container root fs. Empty = spill to the default (root fs).
  DUCKDB_TEMP_DIRECTORY: /tmp/duckdb
  DUCKDB_MEMORY_LIMIT: 512MB
  # Parquet write tuning (catalog-global; applies to din's raw_events and dq's
  # decoded tables). v2 delta-packs the sorted (subject,"time") layer for a
  # large size win over v1 on top of zstd — only DuckDB reads the lake, so it
  # is compatibility-safe. target_file_size is DuckLake's compaction target.
  LAKE_PARQUET_VERSION: '2'
  LAKE_TARGET_FILE_SIZE: 512MB
  # Exactly one maintenance process per catalog: keep this on a single
  # replica (or a dedicated deployment) — never with autoscaling > 1.
  LAKE_MAINTENANCE_ENABLED: 'true'
  LAKE_MAINTENANCE_INTERVAL: 15m
  # Must exceed the slowest downstream consumer's lag (dq): expiring an
  # unread snapshot truncates its change feed.
  LAKE_SNAPSHOT_RETENTION: 72h
  # Connections each partition's writer round-robins bundles across, so several
  # bundles' S3 uploads overlap (raises per-partition write throughput). The
  # DuckDB pool is sized partitions*this + 2.
  LAKE_WRITER_CONNECTIONS: '2'
  # Sink batching (all optional; unset takes the binary defaults). A buffer is
  # flushed at SINK_MAX_ROWS_PER_FLUSH rows, SINK_MAX_BYTES_PER_FLUSH bytes,
  # SINK_MAX_AGE once it holds at least SINK_MIN_FLUSH_BYTES, or SINK_MAX_AGE_HARD
  # regardless of size. Raise SINK_MIN_FLUSH_BYTES / SINK_MAX_AGE_HARD to cut tiny
  # Parquet files on low-traffic partitions (trades latency-to-durable).
  SINK_MIN_FLUSH_BYTES: '16777216' # 16 MiB
  SINK_MAX_AGE: 1m
  SINK_MAX_AGE_HARD: 5m
service:
  type: ClusterIP
  ports:
    mon-http:
      port: 8888
      targetPort: mon-http
      protocol: TCP
    https:
      port: 443
      targetPort: https
      protocol: TCP
ports:
  - name: mon-http
    containerPort: 8888
    protocol: TCP
  - name: https
    containerPort: 9443
    protocol: TCP
  - name: http
    containerPort: 9442
    protocol: TCP
livenessProbe:
  httpGet:
    path: /ping
    port: mon-http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  httpGet:
    path: /ready
    port: mon-http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
ingress:
  enabled: true
  className: nginx-direct
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: '50'
  hosts:
    - host: din.dev.dimo.zone
      paths:
        - path: /
          pathType: ImplementationSpecific
          backend:
            service:
              suffix: ''
              port:
                number: 443
  tls: []
certificate:
  commonName: din.dev.dimo.zone
  issuer: cas-dev-dimo-ca-issuer
  caConfigMap: cae-dev-dimo-ca-certs
# Size of the emptyDir backing DUCKDB_TEMP_DIRECTORY (DuckDB spill). Only mounted
# when env.DUCKDB_TEMP_DIRECTORY is set. Raise for deep-history maintenance merges.
duckdbTempSizeLimit: 5Gi
resources:
  limits:
    cpu: '1'
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
# Scoped to ingest pods (see poddisruptionbudget.yaml). minAvailable must be >= 1
# so a node drain / cluster upgrade can't evict every ingest replica at once
# (minAvailable: 0 is a no-op PDB — zero protection).
podDisruptionBudget:
  minAvailable: 1
# Grace period for SIGTERM: must exceed the sink DrainTimeout (30s) + HTTP
# shutdown so a rollout/drain flushes and acks in-flight bundles instead of
# being SIGKILLed mid-commit (which forces WAL redelivery).
terminationGracePeriodSeconds: 60
# Dedicated single-replica maintenance Deployment (din maintain). Use this
# instead of in-process LAKE_MAINTENANCE_ENABLED whenever replicaCount > 1,
# so exactly one maintenance process runs per catalog and its health gauges
# stay scrapable. LAKE_MAINTENANCE_INTERVAL / LAKE_SNAPSHOT_RETENTION come
# from the shared config.
maintenance:
  enabled: false
  # The maintainer merges/expires across the whole catalog (raw_events + the
  # decoded tables) — memory-heavy parquet rewrites. Undersizing it slows merges
  # and leaves small files that inflate per-query S3 GET cost (CHD-20, R2-H5).
  # memoryLimit overrides the shared DUCKDB_MEMORY_LIMIT for the maintainer only.
  memoryLimit: 3GB
  resources:
    limits:
      cpu: '2'
      memory: 4Gi
    requests:
      cpu: '1'
      memory: 1Gi
serviceMonitor:
  enabled: true
  path: /metrics
  port: mon-http
  interval: 30s
# Alerts on the maintenance Deployment's health gauges (SR-14). Thresholds
# default to ~3x the maintenance interval and ~90% of LAKE_SNAPSHOT_RETENTION;
# tune them together with LAKE_MAINTENANCE_INTERVAL / LAKE_SNAPSHOT_RETENTION.
prometheusRule:
  enabled: true
  maintenanceStalledSeconds: 2700 # 45m = 3x the 15m default interval
  snapshotAgeAlertSeconds: 233280 # 64.8h = 90% of the 72h default retention
