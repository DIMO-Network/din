replicaCount: 1
image:
  repository: dimozone/din
  pullPolicy: IfNotPresent
  tag: ''
  command:
    - /din
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  create: true
  annotations: {}
  name: ''
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - all
isDev: true
env:
  ENVIRONMENT: dev
  LOG_LEVEL: info
  OPS_ADDRESS: 0.0.0.0:8888
  DIS_CONNECTION_ADDRESS: 0.0.0.0:9443
  DIS_ATTESTATION_ADDRESS: 0.0.0.0:9442
  TLS_CERT_FILE: /etc/ssl/certs/din/tls.crt
  TLS_KEY_FILE: /etc/ssl/certs/din/tls.key
  TLS_CA_CERT_FILE: /etc/ssl/certs/din/root_ca.crt
  NATS_MODE: external
  NATS_URL: nats://nats-dev:4222
  NATS_REPLICAS: '1'
  DECODESTREAM_ENABLED: 'true'
  FINGERPRINT_VALIDATION: 'true'
  ALLOWABLE_TIME_SKEW: 5m
  DIMO_REGISTRY_CHAIN_ID: 80002
  VEHICLE_NFT_ADDRESS: '0x45fbCD3ef7361d156e8b16F5538AE36DEdf61Da8'
  AFTERMARKET_NFT_ADDRESS: '0x325b45949C833986bC98e98a49F3CA5C5c4643B5'
  SYNTHETIC_NFT_ADDRESS: '0x78513c8CB4D6B6079f813850376bc9c7fc8aE67f'
  TOKEN_EXCHANGE_KEY_SET_URL: https://auth.dev.dimo.zone/keys
  TOKEN_EXCHANGE_ISSUER: https://auth.dev.dimo.zone
  DOCUMENT_SIZE_THRESHOLD: '1048576'
  BLOB_BUCKET: dimo-blob-storage-dev
  BLOB_PREFIX: cloudevent/blobs/
  S3_AWS_REGION: us-east-2
  # DuckLake: LAKE_CATALOG_DSN comes from the secret. DATA_PATH is
  # immutable once the catalog exists — choose deliberately.
  LAKE_DATA_PATH: s3://dimo-storage-dev/lake/
  LAKE_MEMORY_LIMIT: 512MB
  # Exactly one maintenance process per catalog: keep this on a single
  # replica (or a dedicated deployment) — never with autoscaling > 1.
  LAKE_MAINTENANCE_ENABLED: 'true'
  LAKE_MAINTENANCE_INTERVAL: 15m
  # Must exceed the slowest downstream consumer's lag (dq): expiring an
  # unread snapshot truncates its change feed.
  LAKE_SNAPSHOT_RETENTION: 72h
service:
  type: ClusterIP
  ports:
    mon-http:
      port: 8888
      targetPort: mon-http
      protocol: TCP
    https:
      port: 443
      targetPort: https
      protocol: TCP
ports:
  - name: mon-http
    containerPort: 8888
    protocol: TCP
  - name: https
    containerPort: 9443
    protocol: TCP
  - name: http
    containerPort: 9442
    protocol: TCP
livenessProbe:
  httpGet:
    path: /ping
    port: mon-http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  httpGet:
    path: /ready
    port: mon-http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
ingress:
  enabled: true
  className: nginx-direct
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: '50'
  hosts:
    - host: din.dev.dimo.zone
      paths:
        - path: /
          pathType: ImplementationSpecific
          backend:
            service:
              suffix: ''
              port:
                number: 443
  tls: []
certificate:
  commonName: din.dev.dimo.zone
  issuer: cas-dev-dimo-ca-issuer
  caConfigMap: cae-dev-dimo-ca-certs
resources:
  limits:
    cpu: '1'
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
podDisruptionBudget:
  minAvailable: 0
# Dedicated single-replica maintenance Deployment (din maintain). Use this
# instead of in-process LAKE_MAINTENANCE_ENABLED whenever replicaCount > 1,
# so exactly one maintenance process runs per catalog and its health gauges
# stay scrapable. LAKE_MAINTENANCE_INTERVAL / LAKE_SNAPSHOT_RETENTION come
# from the shared config.
maintenance:
  enabled: false
  # The maintainer merges/expires across the whole catalog (raw_events + the
  # decoded tables) — memory-heavy parquet rewrites. Undersizing it slows merges
  # and leaves small files that inflate per-query S3 GET cost (CHD-20, R2-H5).
  # memoryLimit overrides the shared LAKE_MEMORY_LIMIT for the maintainer only.
  memoryLimit: 3GB
  resources:
    limits:
      cpu: '2'
      memory: 4Gi
    requests:
      cpu: '1'
      memory: 1Gi
serviceMonitor:
  enabled: true
  path: /metrics
  port: mon-http
  interval: 30s
