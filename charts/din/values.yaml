replicaCount: 1
image:
  repository: dimozone/din
  pullPolicy: IfNotPresent
  tag: ''
  command:
    - /din
imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''
serviceAccount:
  create: true
  annotations: {}
  name: ''
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - all
isDev: true
env:
  ENVIRONMENT: dev
  LOG_LEVEL: info
  OPS_ADDRESS: 0.0.0.0:8888
  DIS_CONNECTION_ADDRESS: 0.0.0.0:9443
  DIS_ATTESTATION_ADDRESS: 0.0.0.0:9442
  TLS_CERT_FILE: /etc/ssl/certs/din/tls.crt
  TLS_KEY_FILE: /etc/ssl/certs/din/tls.key
  TLS_CA_CERT_FILE: /etc/ssl/certs/din/root_ca.crt
  NATS_MODE: external
  NATS_URL: nats://nats-dev:4222
  NATS_REPLICAS: '1'
  COMPACTOR_ENABLED: 'true'
  DECODESTREAM_ENABLED: 'true'
  FINGERPRINT_VALIDATION: 'true'
  ALLOWABLE_TIME_SKEW: 5m
  DIMO_REGISTRY_CHAIN_ID: 80002
  VEHICLE_NFT_ADDRESS: '0x45fbCD3ef7361d156e8b16F5538AE36DEdf61Da8'
  AFTERMARKET_NFT_ADDRESS: '0x325b45949C833986bC98e98a49F3CA5C5c4643B5'
  SYNTHETIC_NFT_ADDRESS: '0x78513c8CB4D6B6079f813850376bc9c7fc8aE67f'
  TOKEN_EXCHANGE_KEY_SET_URL: https://auth.dev.dimo.zone/keys
  TOKEN_EXCHANGE_ISSUER: https://auth.dev.dimo.zone
  DOCUMENT_SIZE_THRESHOLD: '1048576'
  PARQUET_BUCKET: dimo-storage-dev
  BLOB_BUCKET: dimo-blob-storage-dev
  BLOB_PREFIX: cloudevent/blobs/
  DECODED_PREFIX: decoded/v1/
  S3_AWS_REGION: us-east-2
service:
  type: ClusterIP
  ports:
    mon-http:
      port: 8888
      targetPort: mon-http
      protocol: TCP
    https:
      port: 443
      targetPort: https
      protocol: TCP
ports:
  - name: mon-http
    containerPort: 8888
    protocol: TCP
  - name: https
    containerPort: 9443
    protocol: TCP
  - name: http
    containerPort: 9442
    protocol: TCP
livenessProbe:
  httpGet:
    path: /ping
    port: mon-http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
readinessProbe:
  httpGet:
    path: /ready
    port: mon-http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1
ingress:
  enabled: true
  className: nginx-direct
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: '50'
  hosts:
    - host: din.dev.dimo.zone
      paths:
        - path: /
          pathType: ImplementationSpecific
          backend:
            service:
              suffix: ''
              port:
                number: 443
  tls: []
certificate:
  commonName: din.dev.dimo.zone
  issuer: cas-dev-dimo-ca-issuer
  caConfigMap: cae-dev-dimo-ca-certs
resources:
  limits:
    cpu: '1'
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
podDisruptionBudget:
  minAvailable: 0
serviceMonitor:
  enabled: true
  path: /metrics
  port: mon-http
  interval: 30s
